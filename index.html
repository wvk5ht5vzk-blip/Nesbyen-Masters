<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesbyen Masters</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#22c55e; color:white; }
input { padding:8px; margin:5px; border-radius:6px; }
table { width:100%; margin-top:10px; border-collapse: collapse; }
td, th { border:1px solid #555; padding:5px; }

.avatar {
  width:35px;
  height:35px;
  border-radius:50%;
  background:#333;
  display:inline-block;
  cursor:pointer;
}

.gold { background:gold; color:black; }
.silver { background:silver; color:black; }
.bronze { background:#cd7f32; }
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters LIVE</h1>

<button onclick="newRound()">➕ Ny runde</button>
<select id="roundSelect" onchange="loadRound()"></select>

<br>

<input id="name" placeholder="Spiller">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="hiddenFile" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2",
  storageBucket: "nesbyen-masters-v2.firebasestorage.app",
  messagingSenderId: "733141987995",
  appId: "1:733141987995:web:835ca47d74f244d4220c3e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentRound = null;
let players = [];
let selectedPlayer = null;

// 🔥 NY RUNDE
async function newRound() {
  const r = await addDoc(collection(db, "rounds"), { created: Date.now() });
  currentRound = r.id;
}

// 🔄 RUNDER
onSnapshot(collection(db, "rounds"), snap => {
  const sel = document.getElementById("roundSelect");
  sel.innerHTML = "";
  snap.docs.forEach(d=>{
    const o = document.createElement("option");
    o.value = d.id;
    o.text = d.id;
    sel.appendChild(o);
  });

  if(!currentRound && snap.docs.length){
    currentRound = snap.docs[0].id;
    sel.value = currentRound;
    loadRound();
  }
});

// 📂 LAST
function loadRound(){
  currentRound = document.getElementById("roundSelect").value;

  onSnapshot(collection(db,"rounds",currentRound,"players"), snap=>{
    players = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// ➕ LEGG TIL
async function addPlayer(){
  const name = document.getElementById("name").value;
  if(!name) return;

  await addDoc(collection(db,"rounds",currentRound,"players"),{
    name,
    image:"",
    scores:Array(18).fill(0)
  });

  document.getElementById("name").value="";
}

// 📸 KLIKK BILDE
function uploadImage(id){
  selectedPlayer = id;
  document.getElementById("hiddenFile").click();
}

document.getElementById("hiddenFile").addEventListener("change", async (e)=>{
  const file = e.target.files[0];
  if(!file || !selectedPlayer) return;

  const storageRef = ref(storage,"images/"+Date.now());
  await uploadBytes(storageRef,file);
  const url = await getDownloadURL(storageRef);

  await updateDoc(doc(db,"rounds",currentRound,"players",selectedPlayer),{
    image:url
  });
});

// ❌ SLETT
async function deletePlayer(id){
  await deleteDoc(doc(db,"rounds",currentRound,"players",id));
}

// 🎨 RENDER
function render(){
  let sorted=[...players].sort((a,b)=>total(a)-total(b));

  let html="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    let cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';

    html+=`
    <tr class="${cls}">
      <td>${i+1}</td>
      <td onclick="uploadImage('${p.id}')">
        ${p.image ? `<img src="${p.image}" class="avatar">` : `<div class="avatar"></div>`}
      </td>
      <td>${p.name}</td>
      <td>${total(p)}</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=html;
}

function total(p){ return p.scores.reduce((a,b)=>a+b,0); }

// FIX MODULE EVENTS
window.newRound=newRound;
window.loadRound=loadRound;
window.addPlayer=addPlayer;
window.deletePlayer=deletePlayer;
window.uploadImage=uploadImage;

</script>

</body>
</html>
