<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="A2DCBCD1-97DE-4610-8292-A174AC3EBD0E.png">

<title>Nesbyen Masters</title>
<style>
body { font-family: Arial; background:#020617; color:white; text-align:center; }

button {
  padding:10px;
  margin:4px;
  border:none;
  border-radius:10px;
  background:#22c55e;
  color:white;
  touch-action: manipulation;
}

input, select { padding:10px; border-radius:8px; }

.avatar { width:60px; height:60px; border-radius:50%; border:2px solid white; }

.scroll { overflow-x:auto; }
#scoreTable { min-width:900px; }

.gold { background:gold; color:black; }

#winnerModal {
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
  font-size:24px;
}
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters</h1>

<div id="loginBox">
  <input id="playerName" placeholder="Ditt navn">

  <br><br>

  <button onclick="createGame()">➕ Nytt spill</button>

  <br><br>

  <input id="joinCode" placeholder="Spillkode">
  <button onclick="joinGame()">🔑 Bli med</button>
</div>

<div id="app" style="display:none;">

<p id="welcome"></p>

<select id="courseSelect"></select>
<button onclick="addCourse()">➕ Ny bane</button>

<br>

<select id="roundSelect" onchange="loadRound()"></select>
<button onclick="newRound()">➕ Ny runde</button>
<button onclick="finishRound()">🏁 Ferdig runde</button>

<br><br>

<input id="name" placeholder="Spiller / Lag">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="fileInput" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<div class="scroll">
<table id="scoreTable"></table>
</div>

</div>

<div id="winnerModal" onclick="this.style.display='none'"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user=null;
let tournamentId=null;
let currentRound=null;
let players=[];
let courses=[];
let currentCourse=null;
let selectedPlayer=null;

// CREATE GAME
function createGame(){
  user=document.getElementById("playerName").value;
  if(!user) return alert("Skriv navn");

  localStorage.setItem("user",user);

  const code=Math.floor(1000+Math.random()*9000);

  db.collection("tournaments").add({
    created:Date.now(),
    code:code
  })
  .then(doc=>{
    alert("Spillkode: "+code);

    tournamentId=doc.id;
    localStorage.setItem("tid", doc.id);

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("welcome").innerText="Hei "+user;

    loadRounds();
  })
  .catch(err=>{
    alert("FEIL: " + err.message);
  });
}

// JOIN GAME
function joinGame(){
  user=document.getElementById("playerName").value;
  const code=document.getElementById("joinCode").value;

  if(!user||!code) return alert("Skriv navn og kode");

  localStorage.setItem("user",user);

  db.collection("tournaments")
  .where("code","==",parseInt(code))
  .get()
  .then(snap=>{
    if(snap.empty){
      alert("Fant ikke spill");
      return;
    }

    const doc=snap.docs[0];
    tournamentId=doc.id;

    localStorage.setItem("tid",doc.id);

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("welcome").innerText="Hei "+user;

    loadRounds();
  });
}

// COURSES
db.collection("courses").onSnapshot(snap=>{
  const sel=document.getElementById("courseSelect");
  courses=[];
  sel.innerHTML="";

  snap.forEach(d=>{
    const c={id:d.id,...d.data()};
    courses.push(c);

    const o=document.createElement("option");
    o.value=c.id;
    o.text=c.name;
    sel.appendChild(o);
  });

  currentCourse=courses[0];
});

document.getElementById("courseSelect").onchange=function(){
  currentCourse=courses.find(c=>c.id===this.value);
};

function addCourse(){
  const name=prompt("Navn?");
  if(!name) return;
  const pars=prompt("Pars (4,4,3...)").split(",").map(x=>parseInt(x));
  db.collection("courses").add({name, pars});
}

function getPars(){
  return currentCourse?.pars||Array(18).fill(4);
}

// ROUNDS
function loadRounds(){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds")
  .onSnapshot(snap=>{
    const sel=document.getElementById("roundSelect");

    let rounds=[];
    snap.forEach(d=>rounds.push({id:d.id,...d.data()}));
    rounds.sort((a,b)=>a.created-b.created);

    sel.innerHTML="";

    rounds.forEach((r,i)=>{
      const o=document.createElement("option");
      o.value=r.id;
      o.text="Runde "+(i+1);
      sel.appendChild(o);
    });

    if(rounds.length){
      currentRound=rounds[0].id;
      sel.value=currentRound;
      loadRound();
    }
  });
}

function newRound(){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds")
  .add({created:Date.now()});
}

// LOAD ROUND
function loadRound(){
  currentRound=document.getElementById("roundSelect").value;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players")
  .onSnapshot(snap=>{
    players=[];
    snap.forEach(d=>{
      let data={id:d.id,...d.data()};

      if(!data.scores) data.scores=Array(18).fill(0);
      if(!data.image) data.image="";
      if(data.longest===undefined) data.longest=0;
      if(data.closest===undefined) data.closest=0;

      players.push(data);
    });

    render();
  });
}

// PLAYER
function addPlayer(){
  const name=document.getElementById("name").value;
  if(!name) return;

  const hcp=parseInt(prompt("HCP?"))||0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players")
  .add({
    name,hcp,
    scores:Array(18).fill(0),
    image:"",
    longest:0,
    closest:0
  });

  document.getElementById("name").value="";
}

function deletePlayer(id){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id).delete();
}

// IMAGE
function uploadImage(id){
  selectedPlayer=id;
  const input=document.getElementById("fileInput");
  input.value="";
  setTimeout(()=>input.click(),50);
}

document.getElementById("fileInput").addEventListener("change", e=>{
  const file=e.target.files[0];
  if(!file || !selectedPlayer) return;

  const reader=new FileReader();

  reader.onload=()=>{
    db.collection("tournaments").doc(tournamentId)
    .collection("rounds").doc(currentRound)
    .collection("players").doc(selectedPlayer)
    .update({image:reader.result});
  };

  reader.readAsDataURL(file);
});

// EXTRA
function updateExtra(id,field){
  let val=prompt(field==="longest"?"Meter?":"CM?");
  val=parseFloat(val)||0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({[field]:val});
}

// SCORE
function updateScore(id,hole,val){
  const p=players.find(x=>x.id===id);
  p.scores[hole]+=val;
  if(p.scores[hole]<0)p.scores[hole]=0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({scores:p.scores});
}

// CALC
function total(p){ return p.scores.reduce((a,b)=>a+b,0); }

function totalToPar(p){
  return p.scores.reduce((sum,s,i)=>sum+(s-getPars()[i]),0);
}

function hcpPerHole(p){
  const base=Math.floor((p.hcp||0)/18);
  const extra=(p.hcp||0)%18;
  let arr=Array(18).fill(base);
  for(let i=0;i<extra;i++) arr[i]++;
  return arr;
}

function netScore(p){
  const h=hcpPerHole(p);
  return p.scores.reduce((sum,s,i)=>sum+(s-h[i]),0);
}

function netToPar(p){
  return netScore(p) - getPars().reduce((a,b)=>a+b,0);
}

// FINISH
function finishRound(){
  let winner=[...players].sort((a,b)=>netToPar(a)-netToPar(b))[0];

  document.getElementById("winnerModal").innerHTML="🏆 "+winner.name+" vant!";
  document.getElementById("winnerModal").style.display="flex";

  launchConfetti();
}

function launchConfetti(){
  for(let i=0;i<120;i++){
    let c=document.createElement("div");
    c.style.position="fixed";
    c.style.width="6px";
    c.style.height="6px";
    c.style.background="hsl("+Math.random()*360+",100%,50%)";
    c.style.top="-10px";
    c.style.left=Math.random()*100+"%";
    document.body.appendChild(c);

    c.animate([{transform:"translateY(0)"},{transform:"translateY(100vh)"}],
    {duration:2000});

    setTimeout(()=>c.remove(),2000);
  }
}

// RENDER
function render(){
  if(!getPars()) return;

  let sorted=[...players].sort((a,b)=>netToPar(a)-netToPar(b));

  let lb="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th>Drive</th><th>Pin</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    lb+=`
    <tr class="${i===0?'gold':''}">
      <td>${i+1}</td>
      <td onclick="uploadImage('${p.id}')">
        ${p.image ? `<img src="${p.image}" class="avatar">` : `<div class="avatar"></div>`}
      </td>
      <td>${p.name}<br><small>hcp ${p.hcp||0}</small></td>
      <td>${total(p)} (${totalToPar(p)>0?'+':''}${totalToPar(p)})<br>
      <small>Netto: ${netScore(p)} (${netToPar(p)>0?'+':''}${netToPar(p)})</small></td>
      <td onclick="updateExtra('${p.id}','longest')">${p.longest} m</td>
      <td onclick="updateExtra('${p.id}','closest')">${p.closest} cm</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=lb;

  let sc="<tr><th>Spiller</th>";
  for(let i=1;i<=18;i++) sc+=`<th>${i}<br>${getPars()[i-1]}</th>`;
  sc+="</tr>";

  players.forEach(p=>{
    sc+=`<tr><td>${p.name}</td>`;
    p.scores.forEach((s,i)=>{
      sc+=`
      <td>
        <button ontouchstart="event.preventDefault(); updateScore('${p.id}',${i},-1)">-</button>
        ${s}
        <button ontouchstart="event.preventDefault(); updateScore('${p.id}',${i},1)">+</button>
      </td>`;
    });
    sc+="</tr>";
  });

  document.getElementById("scoreTable").innerHTML=sc;
}

// AUTO START
window.onload = function(){
  const savedUser = localStorage.getItem("user");
  const savedTid = localStorage.getItem("tid");

  if(savedUser){
    document.getElementById("playerName").value = savedUser;
  }

  if(savedUser && savedTid){
    user = savedUser;
    tournamentId = savedTid;

    document.getElementById("loginBox").style.display="none";
    document.getElementById("app").style.display="block";
    document.getElementById("welcome").innerText="Hei "+user;

    loadRounds();
  }
};
</script>

</body>
</html>
