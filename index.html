<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nesbyen Masters</title>

<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="A2DCBCD1-97DE-4610-8292-A174AC3EBD0E.png">

<style>
body { font-family: Arial; background: linear-gradient(135deg,#0f172a,#1e293b); color:white; text-align:center; }

button { padding:10px; margin:4px; border:none; border-radius:10px; background:#22c55e; color:white; }

input, select { padding:10px; border-radius:8px; }

table { width:95%; margin:auto; border-collapse: collapse; background:rgba(255,255,255,0.05); }

td, th { padding:6px; }

.avatar { width:65px; height:65px; border-radius:50%; }

.gold { background:gold; color:black; }

.score-minus { color:#22c55e; font-weight:bold; }
.score-plus { color:#ef4444; font-weight:bold; }
.score-zero { color:white; }
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters</h1>

<select id="courseSelect"></select>
<button onclick="addCourse()">➕ Ny bane</button>

<br>

<button onclick="newRound()">➕ Ny runde</button>
<select id="roundSelect" onchange="loadRound()"></select>
<button onclick="deleteRound()">🧨</button>

<br><br>

<input id="name" placeholder="Spiller">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="fileInput" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<table id="scoreTable"></table>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentRound=null;
let players=[];
let selectedPlayer=null;
let courses=[];
let currentCourse=null;

// COURSES
db.collection("courses").onSnapshot(snap=>{
  const sel=document.getElementById("courseSelect");
  courses=[];
  sel.innerHTML="";

  snap.forEach(d=>{
    const c={id:d.id,...d.data()};
    courses.push(c);

    const o=document.createElement("option");
    o.value=d.id;
    o.text=c.name;
    sel.appendChild(o);
  });

  if(courses.length && !currentCourse){
    currentCourse=courses[0];
  }
});

// CHANGE COURSE FIX 🔥
document.getElementById("courseSelect").onchange=function(){
  const id=this.value;
  currentCourse=courses.find(c=>c.id===id);
  render();
};

// ADD COURSE
function addCourse(){
  const name=prompt("Navn på bane?");
  if(!name) return;

  const parString=prompt("18 hull par (4,4,3...)");
  const pars=parString.split(",").map(x=>parseInt(x));

  db.collection("courses").add({name, pars});
}

// GET PAR
function getPars(){
  return currentCourse?.pars || Array(18).fill(4);
}

// NEW ROUND
function newRound(){
  const courseId=document.getElementById("courseSelect").value;

  db.collection("rounds").add({
    created:Date.now(),
    courseId
  });
}

// ROUNDS
db.collection("rounds").onSnapshot(snap=>{
  const sel=document.getElementById("roundSelect");

  let rounds=[];
  snap.forEach(d=>rounds.push({id:d.id,...d.data()}));
  rounds.sort((a,b)=>a.created-b.created);

  sel.innerHTML="";

  rounds.forEach((r,i)=>{
    const o=document.createElement("option");
    o.value=r.id;
    o.text="Runde "+(i+1);
    sel.appendChild(o);
  });

  if(!currentRound && rounds.length){
    currentRound=rounds[0].id;
    sel.value=currentRound;
    loadRound();
  }
});

// LOAD ROUND
function loadRound(){
  currentRound=document.getElementById("roundSelect").value;

  db.collection("rounds").doc(currentRound).get().then(doc=>{
    const data=doc.data();
    currentCourse=courses.find(c=>c.id===data.courseId) || courses[0];
  });

  db.collection("rounds").doc(currentRound).collection("players")
  .onSnapshot(snap=>{
    players=[];
    snap.forEach(d=>players.push({id:d.id,...d.data()}));
    render();
  });
}

// DELETE ROUND
async function deleteRound(){
  if(!confirm("Slette runde?")) return;

  const snap=await db.collection("rounds").doc(currentRound).collection("players").get();
  for(const d of snap.docs){ await d.ref.delete(); }

  await db.collection("rounds").doc(currentRound).delete();
}

// PLAYER
function addPlayer(){
  const name=document.getElementById("name").value;
  if(!name) return;

  db.collection("rounds").doc(currentRound).collection("players").add({
    name,
    image:"",
    scores:Array(18).fill(0)
  });

  document.getElementById("name").value="";
}

// DELETE PLAYER ✅
function deletePlayer(id){
  db.collection("rounds").doc(currentRound)
  .collection("players").doc(id).delete();
}

// IMAGE FIX 🔥
function uploadImage(id){
  selectedPlayer=id;
  document.getElementById("fileInput").value="";
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", async function(e){
  const file = e.target.files[0];
  if(!file || !selectedPlayer) return;

  const reader = new FileReader();

  reader.onload = async function(){
    const base64 = reader.result;

    await db.collection("rounds")
      .doc(currentRound)
      .collection("players")
      .doc(selectedPlayer)
      .update({ image: base64 });

    document.getElementById("fileInput").value="";
  };

  reader.readAsDataURL(file);
});

// SCORE
function updateScore(id,hole,val){
  const p=players.find(x=>x.id===id);
  p.scores[hole]+=val;
  if(p.scores[hole]<0) p.scores[hole]=0;

  db.collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({scores:p.scores});
}

function total(p){ return p.scores.reduce((a,b)=>a+b,0); }

function totalToPar(p){
  return p.scores.reduce((sum,s,i)=>sum+(s-getPars()[i]),0);
}

// RENDER
function render(){
  let sorted=[...players].sort((a,b)=>totalToPar(a)-totalToPar(b));

  let lb="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    lb+=`
    <tr class="${i===0?'gold':''}">
      <td>${i+1}</td>
      <td onclick="uploadImage('${p.id}')">
        ${p.image ? `<img src="${p.image}" class="avatar">` : `<div class="avatar"></div>`}
      </td>
      <td>${p.name}</td>
      <td>${total(p)} (${totalToPar(p)>0?'+':''}${totalToPar(p)})</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=lb;

  let sc="<tr><th>Spiller</th>";
  for(let i=1;i<=18;i++) sc+=`<th>${i}<br>${getPars()[i-1]}</th>`;
  sc+="</tr>";

  players.forEach(p=>{
    sc+=`<tr><td>${p.name}</td>`;

    p.scores.forEach((s,i)=>{
      const diff=s-getPars()[i];

      sc+=`
      <td>
        <button onclick="updateScore('${p.id}',${i},-1)">-</button>
        <span class="${
          diff<0?'score-minus':diff>0?'score-plus':'score-zero'
        }">${s}</span>
        <button onclick="updateScore('${p.id}',${i},1)">+</button>
      </td>`;
    });

    sc+="</tr>";
  });

  document.getElementById("scoreTable").innerHTML=sc;
}
</script>

</body>
</html>
