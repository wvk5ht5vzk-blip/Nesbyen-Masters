<!DOCTYPE html>
<html>
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nesbyen Masters">

<link rel="apple-touch-icon" href="A2DCBCD1-97DE-4610-8292-A174AC3E....png">
<link rel="manifest" href="manifest.json">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<body>

<header>🏌️ Nesbyen Masters</header>

<div id="feed"></div>

<div id="login"></div>
<div id="app"></div>

<input type="file" id="fileInput" style="display:none">

<nav>
  <button onclick="setScreen('leaderboard')">🏆</button>
  <button onclick="setScreen('score')">📊</button>
  <button onclick="setScreen('players')">👥</button>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

<div id="toast">
  <span id="toastText"></span>
  <button onclick="closeToast()" style="margin-left:10px">❌</button>
</div>

<div id="profileModal" style="display:none;"></div>

<div id="roundModal" onclick="closeRoundModal()" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
"></div>
