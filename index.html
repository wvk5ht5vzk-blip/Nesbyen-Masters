<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesbyen Masters</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }

button { padding:8px; margin:3px; border:none; border-radius:8px; background:#22c55e; color:white; }

input { padding:8px; border-radius:6px; }

table { width:100%; margin-top:10px; border-collapse: collapse; }
td, th { border:1px solid #555; padding:5px; }

.avatar {
  width:50px;
  height:50px;
  border-radius:50%;
  background:#333;
}

.gold { background:gold; color:black; }
.silver { background:silver; color:black; }
.bronze { background:#cd7f32; }

.topbar { margin-bottom:10px; }
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters LIVE</h1>

<div class="topbar">
<button onclick="newRound()">➕ Ny runde</button>
<select id="roundSelect" onchange="loadRound()"></select>
<button onclick="deleteRound()">🧨 Slett runde</button>
</div>

<input id="name" placeholder="Spiller">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="fileInput" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<table id="scoreTable"></table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentRound = null;
let players = [];
let selectedPlayer = null;

// 🔥 NY RUNDE
async function newRound(){
  const snap = await getDocs(collection(db,"rounds"));
  const nr = snap.size + 1;

  const r = await addDoc(collection(db,"rounds"),{
    name:"Runde "+nr,
    created:Date.now()
  });

  currentRound = r.id;
}

// 🔄 RUNDER
onSnapshot(collection(db,"rounds"), snap=>{
  const sel = document.getElementById("roundSelect");
  sel.innerHTML="";

  snap.docs.forEach((d,i)=>{
    const data = d.data();
    const name = data.name || "Runde " + (i+1);

    const o = document.createElement("option");
    o.value = d.id;
    o.text = name;
    sel.appendChild(o);
  });

  if(!currentRound && snap.docs.length){
    currentRound = snap.docs[0].id;
    sel.value = currentRound;
    loadRound();
  }
});

// 📂 LAST RUNDE
function loadRound(){
  currentRound = document.getElementById("roundSelect").value;

  onSnapshot(collection(db,"rounds",currentRound,"players"), snap=>{
    players = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });
}

// ❌ SLETT RUNDE
async function deleteRound(){
  if(!currentRound) return;

  if(!confirm("Slette denne runden?")) return;

  const playersSnap = await getDocs(collection(db,"rounds",currentRound,"players"));

  for(const p of playersSnap.docs){
    await deleteDoc(doc(db,"rounds",currentRound,"players",p.id));
  }

  await deleteDoc(doc(db,"rounds",currentRound));
  currentRound = null;
}

// ➕ LEGG TIL SPILLER
async function addPlayer(){
  const name = document.getElementById("name").value;
  if(!name) return;

  await addDoc(collection(db,"rounds",currentRound,"players"),{
    name,
    image:"",
    scores:Array(18).fill(0)
  });

  document.getElementById("name").value="";
}

// 📸 BILDE (FIXA!)
function uploadImage(id){
  selectedPlayer = id;
  document.getElementById("fileInput").value="";
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file || !selectedPlayer){
    alert("Feil med bildevalg");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(){
    await updateDoc(
      doc(db,"rounds",currentRound,"players",selectedPlayer),
      { image: reader.result }
    );
  };

  reader.readAsDataURL(file);
});

// ❌ SLETT SPILLER
async function deletePlayer(id){
  await deleteDoc(doc(db,"rounds",currentRound,"players",id));
}

// ➕➖ SCORE
async function updateScore(id,hole,val){
  const p = players.find(x=>x.id===id);
  p.scores[hole] += val;
  if(p.scores[hole] < 0) p.scores[hole]=0;

  await updateDoc(doc(db,"rounds",currentRound,"players",id),{
    scores:p.scores
  });
}

function total(p){
  return p.scores.reduce((a,b)=>a+b,0);
}

// 🎨 RENDER
function render(){

  let sorted=[...players].sort((a,b)=>total(a)-total(b));

  let lb="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    let cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';

    lb+=`
    <tr class="${cls}">
      <td>${i+1}</td>
      <td>
        <button onclick="uploadImage('${p.id}')" style="background:none;">
          ${p.image ? `<img src="${p.image}" class="avatar">` : `<div class="avatar"></div>`}
        </button>
      </td>
      <td>${p.name}</td>
      <td>${total(p)}</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=lb;

  let sc="<tr><th>Spiller</th>";
  for(let i=1;i<=18;i++) sc+=`<th>${i}</th>`;
  sc+="</tr>";

  players.forEach(p=>{
    sc+=`<tr><td>${p.name}</td>`;

    p.scores.forEach((s,i)=>{
      sc+=`
      <td>
        <button onclick="updateScore('${p.id}',${i},-1)">-</button>
        ${s}
        <button onclick="updateScore('${p.id}',${i},1)">+</button>
      </td>`;
    });

    sc+="</tr>";
  });

  document.getElementById("scoreTable").innerHTML=sc;
}

// GLOBAL
window.newRound=newRound;
window.loadRound=loadRound;
window.deleteRound=deleteRound;
window.addPlayer=addPlayer;
window.deletePlayer=deletePlayer;
window.uploadImage=uploadImage;
window.updateScore=updateScore;

</script>

</body>
</html>
