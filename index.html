<!DOCTYPE html>
<html>
<head>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nesbyen Masters">

<link rel="apple-touch-icon" href="icon..PNG">

<meta name="theme-color" content="#0f172a">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nesbyen Masters</title>

<link rel="stylesheet" href="styles.css">
</head>
<body>

<header>🏌️ Nesbyen Masters</header>

<div id="feed"></div>

<div id="login"></div>
<div id="app"></div>

<input type="file" id="fileInput" style="display:none">

<nav>
  <button onclick="setScreen('leaderboard')">🏆</button>
  <button onclick="setScreen('score')">📊</button>
  <button onclick="setScreen('players')">👥</button>
</nav>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>

<div id="toast">
  <span id="toastText"></span>
  <button onclick="closeToast()" style="margin-left:10px">❌</button>
</div>

<div id="profileModal" style="display:none;"></div>

<div id="roundModal" onclick="closeRoundModal()" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
"></div>

<script>
document.addEventListener("click", function(e){
  if(e.target.tagName === "BUTTON"){
    e.target.blur(); // 🔥 fikser iOS PWA click bug
  }
});
</script>

<div id="wheelModal" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
">

  <div style="text-align:center;">

    <div style="position:relative; width:280px; height:280px; margin:auto;">
    
      <div style="
      position:absolute;
      top:-12px;
      left:50%;
      transform:translateX(-50%);
      font-size:28px;
      z-index:10;
">
  🔻
</div>
      <div id="wheel" style="
        width:280px;
        height:280px;
        border-radius:50%;
        border:6px solid white;
        transition: transform 5s ease-out;
        position:relative;

        background: conic-gradient(
          #16a34a 0deg 36deg,
          #15803d 36deg 72deg,
          #16a34a 72deg 108deg,
          #15803d 108deg 144deg,
          #16a34a 144deg 180deg,
          #15803d 180deg 216deg,
          #16a34a 216deg 252deg,
          #15803d 252deg 288deg,
          #16a34a 288deg 324deg,
          #15803d 324deg 360deg
        );
      ">

        <!-- 🔥 VIKTIG: labels ligger INNI wheel -->
        <div id="wheelLabels">
          <div class="label" style="--i:0">🎉</div>
          <div class="label" style="--i:1">➖</div>
          <div class="label" style="--i:2">🍺</div>
          <div class="label" style="--i:3">🍺</div>
          <div class="label" style="--i:4">🥃</div>
          <div class="label" style="--i:5">🥃</div>
          <div class="label" style="--i:6">🍻</div>
          <div class="label" style="--i:7">🍻</div>
          <div class="label" style="--i:8">😈</div>
          <div class="label" style="--i:9">😈</div>
        </div>

      </div>

    </div>

    <div style="margin-top:20px;">
      <button onclick="closeWheel()">❌</button>
    </div>

  </div>
</div>

  <!-- pointer -->
  <div style="
    position:absolute;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:30px;
  ">
    
  </div>

</div>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-messaging-compat.js"></script>

<script src="firebase.js"></script>
<script src="app.js"></script>  
</body>

</html>
