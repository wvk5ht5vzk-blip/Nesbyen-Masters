<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nesbyen Masters</title>

<style>
body { font-family: Arial; background:#020617; color:white; text-align:center; }

button { padding:10px; margin:4px; border:none; border-radius:10px; background:#22c55e; color:white; }

input, select { padding:10px; border-radius:8px; }

.avatar { width:60px; height:60px; border-radius:50%; border:2px solid white; }

.scroll { overflow-x:auto; }
#scoreTable { min-width:900px; }

.gold { background:gold; color:black; }
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters</h1>

<div id="loginBox">
  <input id="playerName" placeholder="Ditt navn">
  <button onclick="login()">Start</button>
</div>

<div id="app" style="display:none;">

<p id="welcome"></p>

<button onclick="newTournament()">➕ Ny turnering</button>

<select id="roundSelect" onchange="loadRound()"></select>
<button onclick="newRound()">➕ Ny runde</button>

<br><br>

<input id="name" placeholder="Spiller / Lag">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="fileInput" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<div class="scroll">
<table id="scoreTable"></table>
</div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let user=null;
let tournamentId=null;
let currentRound=null;
let players=[];

// LOGIN
function login(){
  user=document.getElementById("playerName").value;
  if(!user) return;

  localStorage.setItem("user",user);

  document.getElementById("loginBox").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("welcome").innerText="Hei "+user;

  init();
}

// AUTO LOGIN
window.onload=function(){
  const saved=localStorage.getItem("user");
  if(saved){
    document.getElementById("playerName").value=saved;
    login();
  }
}

// INIT
function init(){
  const url=new URL(window.location.href);
  tournamentId=url.searchParams.get("tid");

  if(!tournamentId){
    newTournament();
  }else{
    loadRounds();
  }
}

// NEW TOURNAMENT
function newTournament(){
  db.collection("tournaments").add({
    created:Date.now()
  }).then(doc=>{
    window.location="?tid="+doc.id;
  });
}

// LOAD ROUNDS
function loadRounds(){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds")
  .onSnapshot(snap=>{
    const sel=document.getElementById("roundSelect");

    let rounds=[];
    snap.forEach(d=>rounds.push({id:d.id,...d.data()}));
    rounds.sort((a,b)=>a.created-b.created);

    sel.innerHTML="";

    rounds.forEach((r,i)=>{
      const o=document.createElement("option");
      o.value=r.id;
      o.text="Runde "+(i+1);
      sel.appendChild(o);
    });

    if(rounds.length){
      currentRound=rounds[0].id;
      sel.value=currentRound;
      loadRound();
    }
  });
}

// NEW ROUND
function newRound(){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds")
  .add({created:Date.now()});
}

// LOAD ROUND
function loadRound(){
  currentRound=document.getElementById("roundSelect").value;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players")
  .onSnapshot(snap=>{
    players=[];
    snap.forEach(d=>{
      let data={id:d.id,...d.data()};
      if(!data.scores) data.scores=Array(18).fill(0);
      players.push(data);
    });
    render();
  });
}

// ADD PLAYER
function addPlayer(){
  const name=document.getElementById("name").value;
  if(!name) return;

  const hcp=parseInt(prompt("HCP?"))||0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players")
  .add({
    name,
    hcp,
    scores:Array(18).fill(0),
    image:"",
    longest:0,
    closest:0
  });

  document.getElementById("name").value="";
}

// DELETE PLAYER
function deletePlayer(id){
  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id).delete();
}

// IMAGE
function uploadImage(id){
  document.getElementById("fileInput").onchange=e=>{
    const file=e.target.files[0];
    const reader=new FileReader();

    reader.onload=()=>{
      db.collection("tournaments").doc(tournamentId)
      .collection("rounds").doc(currentRound)
      .collection("players").doc(id)
      .update({image:reader.result});
    };

    reader.readAsDataURL(file);
  };

  document.getElementById("fileInput").click();
}

// EXTRA
function updateExtra(id,field){
  let val=prompt(field==="longest"?"Meter?":"CM?");
  val=parseFloat(val)||0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({[field]:val});
}

// SCORE
function updateScore(id,hole,val){
  const p=players.find(x=>x.id===id);
  p.scores[hole]+=val;
  if(p.scores[hole]<0)p.scores[hole]=0;

  db.collection("tournaments").doc(tournamentId)
  .collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({scores:p.scores});
}

// CALC
function total(p){ return p.scores.reduce((a,b)=>a+b,0); }

function totalToPar(p){
  return p.scores.reduce((sum,s,i)=>sum+(s-4),0);
}

function hcpPerHole(p){
  const base=Math.floor((p.hcp||0)/18);
  const extra=(p.hcp||0)%18;
  let arr=Array(18).fill(base);
  for(let i=0;i<extra;i++) arr[i]++;
  return arr;
}

function netScore(p){
  const h=hcpPerHole(p);
  return p.scores.reduce((sum,s,i)=>sum+(s-h[i]),0);
}

function netToPar(p){
  return netScore(p)-72;
}

// RENDER
function render(){
  let sorted=[...players].sort((a,b)=>netToPar(a)-netToPar(b));

  let lb="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th>Drive</th><th>Pin</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    lb+=`
    <tr class="${i===0?'gold':''}">
      <td>${i+1}</td>
      <td onclick="uploadImage('${p.id}')">
        ${p.image?`<img src="${p.image}" class="avatar">`:`<div class="avatar"></div>`}
      </td>
      <td>${p.name}<br><small>hcp ${p.hcp}</small></td>
      <td>
        ${total(p)} (${totalToPar(p)>0?'+':''}${totalToPar(p)})
        <br>
        <small>Netto: ${netScore(p)} (${netToPar(p)>0?'+':''}${netToPar(p)})</small>
      </td>
      <td onclick="updateExtra('${p.id}','longest')">${p.longest||0} m</td>
      <td onclick="updateExtra('${p.id}','closest')">${p.closest||0} cm</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=lb;

  let sc="<tr><th>Spiller</th>";
  for(let i=1;i<=18;i++) sc+=`<th>${i}</th>`;
  sc+="</tr>";

  players.forEach(p=>{
    sc+=`<tr><td>${p.name}</td>`;
    p.scores.forEach((s,i)=>{
      sc+=`
      <td>
        <button onclick="updateScore('${p.id}',${i},-1)">-</button>
        ${s}
        <button onclick="updateScore('${p.id}',${i},1)">+</button>
      </td>`;
    });
    sc+="</tr>";
  });

  document.getElementById("scoreTable").innerHTML=sc;
}
</script>

</body>
</html>
