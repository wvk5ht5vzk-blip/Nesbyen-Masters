<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nesbyen Masters</title>

<!-- 🔥 PWA -->
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Masters">
<link rel="apple-touch-icon" href="icon.png">

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }

button { padding:8px; margin:3px; border:none; border-radius:8px; background:#22c55e; color:white; }

input { padding:8px; border-radius:6px; }

table { width:100%; margin-top:10px; border-collapse: collapse; }
td, th { border:1px solid #555; padding:5px; }

.avatar {
  width:60px;
  height:60px;
  border-radius:50%;
  background:#333;
}

.gold { background:gold; color:black; }
.silver { background:silver; color:black; }
.bronze { background:#cd7f32; }
</style>
</head>

<body>

<h1>🏌️ Nesbyen Masters LIVE</h1>

<button onclick="newRound()">➕ Ny runde</button>
<select id="roundSelect" onchange="loadRound()"></select>
<button onclick="deleteRound()">🧨 Slett runde</button>

<br><br>

<input id="name" placeholder="Spiller">
<button onclick="addPlayer()">Legg til</button>

<input type="file" id="fileInput" style="display:none">

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<table id="scoreTable"></table>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentRound = null;
let players = [];
let selectedPlayer = null;

// NY RUNDE
function newRound(){
  db.collection("rounds").add({
    created: Date.now()
  });
}

// RUNDER
db.collection("rounds").onSnapshot(snap=>{
  const sel = document.getElementById("roundSelect");

  let rounds=[];
  snap.forEach(d=>rounds.push({id:d.id,...d.data()}));
  rounds.sort((a,b)=>a.created-b.created);

  sel.innerHTML="";

  rounds.forEach((r,i)=>{
    const o=document.createElement("option");
    o.value=r.id;
    o.text="Runde "+(i+1);
    sel.appendChild(o);
  });

  if(!currentRound && rounds.length){
    currentRound=rounds[0].id;
    sel.value=currentRound;
    loadRound();
  }
});

// LAST RUNDE
function loadRound(){
  currentRound=document.getElementById("roundSelect").value;

  db.collection("rounds").doc(currentRound).collection("players")
  .onSnapshot(snap=>{
    players=[];
    snap.forEach(d=>players.push({id:d.id,...d.data()}));
    render();
  });
}

// SLETT RUNDE
async function deleteRound(){
  if(!currentRound) return;
  if(!confirm("Slette runde?")) return;

  const snap = await db.collection("rounds").doc(currentRound).collection("players").get();

  for(const docu of snap.docs){
    await docu.ref.delete();
  }

  await db.collection("rounds").doc(currentRound).delete();

  currentRound=null;
}

// LEGG TIL SPILLER
function addPlayer(){
  const name=document.getElementById("name").value;
  if(!name) return;

  db.collection("rounds").doc(currentRound).collection("players").add({
    name,
    image:"",
    scores:Array(18).fill(0)
  });

  document.getElementById("name").value="";
}

// BILDE
function uploadImage(id){
  selectedPlayer=id;
  document.getElementById("fileInput").click();
}

document.getElementById("fileInput").addEventListener("change",function(e){
  const file=e.target.files[0];
  if(!file) return;

  const reader=new FileReader();

  reader.onload=async function(){
    await db.collection("rounds").doc(currentRound)
    .collection("players").doc(selectedPlayer)
    .update({image:reader.result});
  };

  reader.readAsDataURL(file);
});

// SLETT SPILLER
function deletePlayer(id){
  db.collection("rounds").doc(currentRound)
  .collection("players").doc(id).delete();
}

// SCORE
function updateScore(id,hole,val){
  const p=players.find(x=>x.id===id);
  p.scores[hole]+=val;
  if(p.scores[hole]<0) p.scores[hole]=0;

  db.collection("rounds").doc(currentRound)
  .collection("players").doc(id)
  .update({scores:p.scores});
}

function total(p){
  return p.scores.reduce((a,b)=>a+b,0);
}

// RENDER
function render(){
  let sorted=[...players].sort((a,b)=>total(a)-total(b));

  let lb="<tr><th>#</th><th></th><th>Navn</th><th>Score</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    let cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';

    lb+=`
    <tr class="${cls}">
      <td>${i+1}</td>
      <td onclick="uploadImage('${p.id}')">
        ${p.image ? `<img src="${p.image}" class="avatar">` : `<div class="avatar"></div>`}
      </td>
      <td>${p.name}</td>
      <td>${total(p)}</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML=lb;

  let sc="<tr><th>Spiller</th>";
  for(let i=1;i<=18;i++) sc+=`<th>${i}</th>`;
  sc+="</tr>";

  players.forEach(p=>{
    sc+=`<tr><td>${p.name}</td>`;

    p.scores.forEach((s,i)=>{
      sc+=`
      <td>
        <button onclick="updateScore('${p.id}',${i},-1)">-</button>
        ${s}
        <button onclick="updateScore('${p.id}',${i},1)">+</button>
      </td>`;
    });

    sc+="</tr>";
  });

  document.getElementById("scoreTable").innerHTML=sc;
}
</script>

</body>
</html>
