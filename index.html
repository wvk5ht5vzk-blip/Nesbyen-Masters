<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nesbyen Masters LIVE</title>

  <link rel="apple-touch-icon" href="icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">

  <style>
    body {
      font-family: Arial;
      background: #0b3d2e;
      color: #f5f5dc;
      text-align: center;
    }

    table {
      margin: 10px auto;
      border-collapse: collapse;
    }

    td, th {
      border: 1px solid gold;
      padding: 4px;
    }

    input {
      width: 35px;
      background: #123f34;
      color: white;
      border: none;
      text-align: center;
    }

    button {
      margin: 5px;
      padding: 6px 10px;
      background: gold;
      border: none;
      border-radius: 6px;
      font-weight: bold;
    }

    img {
      width: 25px;
      height: 25px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 5px;
    }

    .gold { background: #ffd700; color: black; }
    .silver { background: #c0c0c0; color: black; }
    .bronze { background: #cd7f32; color: black; }
  </style>
</head>

<body>

<h1>🏌️ Nesbyen Masters LIVE</h1>

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h3>Scorekort</h3>
<table id="scoreTable"></table>

<br>

<input id="name" placeholder="Spiller">
<button onclick="addPlayer()">Legg til</button>
<button onclick="resetAll()">Reset</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbU6RL1oIdtjGNF-min5swSbB77iM31LA",
    authDomain: "nesbyen-masters.firebaseapp.com",
    projectId: "nesbyen-masters",
    storageBucket: "nesbyen-masters.firebasestorage.app",
    messagingSenderId: "346674418458",
    appId: "1:346674418458:web:ff94275dee562e0ca492a3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const holes = 18;
  let players = [];

  const playersRef = collection(db, "players");

  onSnapshot(playersRef, (snapshot) => {
    players = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  });

  function addPlayer() {
    const name = document.getElementById("name").value;
    const image = prompt("Lim inn bilde-URL (valgfritt)");

    if (!name) return;

    addDoc(playersRef, {
      name,
      image: image || "",
      scores: Array(holes).fill(0)
    });

    document.getElementById("name").value = "";
  }

  function deletePlayer(id) {
    if (!confirm("Slette spiller?")) return;
    deleteDoc(doc(db, "players", id));
  }

  function resetAll() {
    if (!confirm("Slette ALLE spillere?")) return;

    players.forEach(p => {
      deleteDoc(doc(db, "players", p.id));
    });
  }

  function updateScore(id, index, value) {
    const player = players.find(p => p.id === id);
    player.scores[index] = parseInt(value) || 0;

    updateDoc(doc(db, "players", id), {
      scores: player.scores
    });
  }

  function editName(id, oldName) {
    const newName = prompt("Endre navn:", oldName);
    if (!newName) return;

    updateDoc(doc(db, "players", id), {
      name: newName
    });
  }

  function sum(arr){ return arr.reduce((a,b)=>a+b,0); }
  function total(p){ return sum(p.scores); }

  function render() {
    let sorted = [...players].sort((a,b)=>total(a)-total(b));

    let lb = "<tr><th>#</th><th>Navn</th><th>Score</th><th></th></tr>";

    sorted.forEach((p,i)=>{
      let cls = "";
      if(i===0) cls="gold";
      if(i===1) cls="silver";
      if(i===2) cls="bronze";

      lb += `<tr class="${cls}">
        <td>${i+1}</td>
        <td onclick="editName('${p.id}','${p.name}')">
          ${p.image 
            ? `<img src="${p.image}">`
            : "👤"}
          ${p.name}
        </td>
        <td>${total(p)}</td>
        <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
      </tr>`;
    });

    document.getElementById("leaderboard").innerHTML = lb;

    let sc = "<tr><th>Spiller</th>";
    for(let i=1;i<=holes;i++) sc += `<th>${i}</th>`;
    sc += "<th>Tot</th></tr>";

    players.forEach(p=>{
      sc += `<tr><td>${p.name}</td>`;
      p.scores.forEach((s,i)=>{
        sc += `<td>
          <input type="number" value="${s}"
          onchange="updateScore('${p.id}',${i},this.value)">
        </td>`;
      });
      sc += `<td>${total(p)}</td></tr>`;
    });

    document.getElementById("scoreTable").innerHTML = sc;
  }

  window.addPlayer = addPlayer;
  window.updateScore = updateScore;
  window.deletePlayer = deletePlayer;
  window.resetAll = resetAll;
  window.editName = editName;
</script>

</body>
</html>
