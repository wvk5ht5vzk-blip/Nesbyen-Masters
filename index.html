<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nesbyen Masters LIVE</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; text-align:center; }
button { padding:10px; margin:5px; border:none; border-radius:8px; background:#22c55e; color:white; }
input { padding:5px; margin:5px; }
table { width:100%; margin-top:10px; border-collapse: collapse; }
td, th { border:1px solid #555; padding:5px; }
img { border-radius:50%; vertical-align:middle; margin-right:5px; }
.gold { background:gold; color:black; }
.silver { background:silver; color:black; }
.bronze { background:#cd7f32; }
</style>

</head>

<body>

<h1>🏌️ Nesbyen Masters LIVE</h1>

<button onclick="newRound()">➕ Ny runde</button>
<select id="roundSelect" onchange="loadRound()"></select>

<br>

<input id="name" placeholder="Spiller">
<input type="file" id="imageInput">
<button onclick="addPlayer()">Legg til</button>

<h2>Leaderboard</h2>
<table id="leaderboard"></table>

<h2>Scorekort</h2>
<table id="scoreTable"></table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyDDrqLTUtImklgFF1W59aWaNolyg7GBmj0",
  authDomain: "nesbyen-masters-v2.firebaseapp.com",
  projectId: "nesbyen-masters-v2",
  storageBucket: "nesbyen-masters-v2.firebasestorage.app",
  messagingSenderId: "733141987995",
  appId: "1:733141987995:web:835ca47d74f244d4220c3e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

let currentRound = null;
let players = [];

const holes = 18;

// 🆕 NY RUNDE
async function newRound() {
  const docRef = await addDoc(collection(db, "rounds"), {
    created: Date.now()
  });
  currentRound = docRef.id;
  loadRounds();
}

// 📂 HENT RUNDER
function loadRounds() {
  onSnapshot(collection(db, "rounds"), snap => {
    const select = document.getElementById("roundSelect");
    select.innerHTML = "";
    snap.docs.forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.text = d.id;
      select.appendChild(opt);
    });
    if (!currentRound && snap.docs.length > 0) {
      currentRound = snap.docs[0].id;
      select.value = currentRound;
      loadRound();
    }
  });
}

// 📂 LAST RUNDE
function loadRound() {
  currentRound = document.getElementById("roundSelect").value;

  onSnapshot(collection(db, "rounds", currentRound, "players"), snap => {
    players = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    render();
  });
}

// ➕ LEGG TIL SPILLER
async function addPlayer() {
  const name = document.getElementById("name").value;
  const file = document.getElementById("imageInput").files[0];

  if (!name || !currentRound) return;

  let imageUrl = "";

  if (file) {
    const storageRef = ref(storage, "images/" + Date.now());
    await uploadBytes(storageRef, file);
    imageUrl = await getDownloadURL(storageRef);
  }

  await addDoc(collection(db, "rounds", currentRound, "players"), {
    name,
    image: imageUrl,
    scores: Array(holes).fill(0)
  });

  document.getElementById("name").value = "";
  document.getElementById("imageInput").value = "";
}

// ❌ SLETT
async function deletePlayer(id) {
  await deleteDoc(doc(db, "rounds", currentRound, "players", id));
}

// ✏️ EDIT
async function editName(id, oldName) {
  const name = prompt("Nytt navn:", oldName);
  if (!name) return;
  await updateDoc(doc(db, "rounds", currentRound, "players", id), { name });
}

// ⛳ SCORE
async function updateScore(id, i, val) {
  const p = players.find(p => p.id === id);
  p.scores[i] = parseInt(val) || 0;

  await updateDoc(doc(db, "rounds", currentRound, "players", id), {
    scores: p.scores
  });
}

function total(p){ return p.scores.reduce((a,b)=>a+b,0); }

// 🎨 RENDER
function render() {
  let sorted = [...players].sort((a,b)=>total(a)-total(b));

  let lb = "<tr><th>#</th><th>Navn</th><th>Score</th><th></th></tr>";

  sorted.forEach((p,i)=>{
    let cls = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    lb += `<tr class="${cls}">
      <td>${i+1}</td>
      <td onclick="editName('${p.id}','${p.name}')">
        ${p.image ? `<img src="${p.image}" width="25">` : ""}
        ${p.name}
      </td>
      <td>${total(p)}</td>
      <td><button onclick="deletePlayer('${p.id}')">❌</button></td>
    </tr>`;
  });

  document.getElementById("leaderboard").innerHTML = lb;

  let sc = "<tr><th>Spiller</th>";
  for(let i=1;i<=holes;i++) sc += `<th>${i}</th>`;
  sc += "</tr>";

  players.forEach(p=>{
    sc += `<tr><td>${p.name}</td>`;
    p.scores.forEach((s,i)=>{
      sc += `<td><input type="number" value="${s}" onchange="updateScore('${p.id}',${i},this.value)"></td>`;
    });
    sc += "</tr>`;
  });

  document.getElementById("scoreTable").innerHTML = sc;
}

// START
loadRounds();
window.newRound = newRound;
window.loadRound = loadRound;
window.addPlayer = addPlayer;
window.deletePlayer = deletePlayer;
window.editName = editName;
window.updateScore = updateScore;
</script>

</body>
</html>
